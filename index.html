:root{
  --page:#f3efe2; --ink:#23211c; --muted:#6b6457; --rule:#cdd8c8;
  --cover:#1f4733; --coveptext:#eef3e8; --accent:#2f6b4a; --interest:#9a3b32;
  --field:#ece7d8; --fieldln:#c8c0ad; --box:#fbf8ef; --shadow:rgba(31,71,51,.12);
}
@media (prefers-color-scheme:dark){
  :root{
    --page:#161f1a; --ink:#dfe6da; --muted:#93a092; --rule:#2c3a30;
    --cover:#10271c; --coveptext:#cfe0cf; --accent:#5b9e76; --interest:#cf6f63;
    --field:#1d271f; --fieldln:#33453a; --box:#1a241d; --shadow:rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box}
body{margin:0;background:var(--page);color:var(--ink);font-family:"Mono",monospace;line-height:1.5;
  padding:40px 18px;-webkit-font-smoothing:antialiased}
.wrap{max-width:880px;margin:0 auto;background:var(--box);border:1px solid var(--rule);
  box-shadow:0 10px 30px var(--shadow)}
.cover{background:var(--cover);color:var(--coveptext);padding:26px 30px}
.cover h1{font-family:"Cover",sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  margin:0;font-size:30px}
.cover .sub{font-size:14px;opacity:.82;margin-top:6px}
.perf{height:14px;background:repeating-linear-gradient(90deg,var(--cover) 0,var(--cover) 7px,transparent 7px,transparent 16px);
  background-position:center;background-size:16px 6px;background-repeat:repeat-x;background-color:var(--box)}
.body{padding:28px 30px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px}
.f{display:flex;flex-direction:column;gap:6px}
.f.full{grid-column:1 / -1}
label{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.input{display:flex;align-items:center;background:var(--field);border:1px solid var(--fieldln);padding:11px 13px}
.input span{color:var(--muted);font-family:"MonoB",monospace;margin-right:8px}
.input input{border:0;background:transparent;color:var(--ink);font-family:"Mono",monospace;font-size:17px;width:100%;outline:none}
.input.suf span{margin:0 0 0 8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:26px 0 4px}
.stat{background:var(--field);border:1px solid var(--fieldln);padding:16px}
.stat .v{font-family:"Cover",sans-serif;font-size:26px}
.stat .v.int{color:var(--interest)}
.stat .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.chart{margin:24px 0 6px;border:1px solid var(--rule);background:var(--page)}
.legend{display:flex;gap:20px;font-size:12px;color:var(--muted);margin-top:10px;flex-wrap:wrap}
.legend i{display:inline-block;width:12px;height:12px;margin-right:7px;vertical-align:-1px}
.savings{margin-top:20px;padding:14px 16px;border:1px dashed var(--accent);font-size:14px}
.savings b{font-family:"MonoB",monospace}
.note{margin-top:18px;color:var(--muted);font-size:13.5px}
.nfa{margin-top:22px;border:2px solid var(--interest);color:var(--interest);
  font-family:"MonoB",monospace;font-size:13px;letter-spacing:.04em;padding:11px 14px;text-transform:uppercase}
.warn{margin-top:18px;border:2px solid var(--interest);color:var(--interest);padding:12px 14px;font-size:14px;display:none}
@media (max-width:640px){.row{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}

  var el={};
  ids.forEach(function(i){el[i]=document.getElementById(i);el[i].addEventListener("input",run);});
  var fmt=function(n){return "$"+Math.round(n).toLocaleString("en-US");};
  var fmtY=function(m){var y=Math.floor(m/12),r=m%12;var s=y+(y===1?" year":" years");if(r)s+=", "+r+(r===1?" month":" months");return s;};

  function simulate(P,annual,nMonths,extra){
    var r=annual/100/12;
    var base;
    if(r===0){base=P/nMonths;}
    else{base=P*r/(1-Math.pow(1+r,-nMonths));}
    var bal=P,paidInt=0,paidPrin=0,m=0;
    var series=[{m:0,bal:P,interest:0}];
    var pay=base+extra;
    var cap=nMonths+1200;
    while(bal>0.005 && m<cap){
      var i=bal*r;
      var prin=pay-i;
      if(prin<=0){return {ok:false,base:base};}
      if(prin>bal)prin=bal;
      bal-=prin;paidInt+=i;paidPrin+=prin;m++;
      series.push({m:m,bal:bal,interest:paidInt});
    }
    return {ok:true,base:base,months:m,interest:paidInt,principal:paidPrin,series:series,monthlyPay:pay};
  }

  function chart(series,nMonths){
    var W=820,H=300,padL=60,padR=18,padT=16,padB=34;
    var maxBal=series[0].bal;
    var maxInt=series[series.length-1].interest;
    var maxY=Math.max(maxBal,maxInt);
    var n=series.length-1;
    var x=function(m){return padL+(W-padL-padR)*(m/n);};
    var y=function(v){return padT+(H-padT-padB)*(1-v/maxY);};
    function path(key){
      var d="M "+x(series[0].m)+" "+y(series[0][key]);
      for(var k=1;k<series.length;k++)d+=" L "+x(series[k].m)+" "+y(series[k][key]);
      return d;
    }
    function area(key){
      var d="M "+x(series[0].m)+" "+(H-padB);
      for(var k=0;k<series.length;k++)d+=" L "+x(series[k].m)+" "+y(series[k][key]);
      d+=" L "+x(series[series.length-1].m)+" "+(H-padB)+" Z";
      return d;
    }
    var ticks="";
    for(var t=0;t<=4;t++){
      var yv=maxY*t/4, yy=y(yv);
      ticks+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="var(--rule)" stroke-width="1"/>';
      ticks+='<text x="'+(padL-8)+'" y="'+(yy+4)+'" text-anchor="end" font-family="Mono,monospace" font-size="11" fill="var(--muted)">'+fmt(yv)+'</text>';
    }
    var years=Math.round(n/12);
    var xlabels="";
    for(var g=0;g<=years;g+=(years>15?5:(years>6?2:1))){
      var mm=g*12; if(mm>n)mm=n;
      xlabels+='<text x="'+x(mm)+'" y="'+(H-padB+22)+'" text-anchor="middle" font-family="Mono,monospace" font-size="11" fill="var(--muted)">'+g+'</text>';
    }
    var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Loan balance and interest over time">';
    svg+=ticks;
    svg+='<path d="'+area("bal")+'" fill="var(--accent)" fill-opacity="0.16"/>';
    svg+='<path d="'+path("bal")+'" fill="none" stroke="var(--accent)" stroke-width="2.5"/>';
    svg+='<path d="'+path("interest")+'" fill="none" stroke="var(--interest)" stroke-width="2.5" stroke-dasharray="2 4"/>';
    svg+=xlabels;
    svg+='<text x="'+((padL+W-padR)/2)+'" y="'+(H-2)+'" text-anchor="middle" font-family="Mono,monospace" font-size="11" fill="var(--muted)">years</text>';
    svg+='</svg>';
    return svg;
  }

  function run(){
    var P=parseFloat(el.amt.value)||0;
    var rate=parseFloat(el.rate.value);
    var years=parseInt(el.years.value,10)||0;
    var extra=parseFloat(el.extra.value)||0;
    if(isNaN(rate))rate=0;
    var warn=document.getElementById("warn");
    if(P<=0||years<=0){
      warn.style.display="block";
      warn.textContent="Enter a loan amount and a term of at least one year.";
      return;
    }
    var n=years*12;
    var sim=simulate(P,rate,n,extra);
    if(!sim.ok){
      warn.style.display="block";
      warn.textContent="The payment does not cover the monthly interest, so the balance never falls. Lower the rate, shorten the term, or add an extra payment.";
      return;
    }
    warn.style.display="none";
    document.getElementById("pay").textContent=fmt(sim.monthlyPay);
    document.getElementById("int").textContent=fmt(sim.interest);
    document.getElementById("tot").textContent=fmt(sim.principal+sim.interest);
    document.getElementById("chart").innerHTML=chart(sim.series,n);
    document.getElementById("payoffleg").textContent="Paid off in "+fmtY(sim.months);

    var sav=document.getElementById("savings");
    if(extra>0){
      var basePay=simulate(P,rate,n,0);
      if(basePay.ok){
        var mSaved=basePay.months-sim.months;
        var iSaved=basePay.interest-sim.interest;
        sav.style.display="block";
        sav.innerHTML="With <b>"+fmt(extra)+"</b> extra a month, this loan is paid off <b>"+fmtY(mSaved)+
          "</b> sooner and saves <b>"+fmt(iSaved)+"</b> in interest.";
      } else { sav.style.display="none"; }
    } else { sav.style.display="none"; }

    var pct=sim.interest/(sim.principal+sim.interest)*100;
    document.getElementById("note").textContent=
      "Over the life of this loan, interest is "+pct.toFixed(1)+"% of everything paid. "+
      "The schedule assumes a fixed rate and the same payment every month, which real loans rarely hold exactly, so treat it as a planning figure.";
  }
  run();
})();
</script>
</body>
